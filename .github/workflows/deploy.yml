name: deploy

# Deploy the skyphusion-monitor Cloudflare Worker on a pushed version tag (v*).
#
# Public repo -> GitHub-hosted ubuntu-latest (fork-safe), never the fleet pool.
# Deploy is tag-only: a bare merge to main NEVER redeploys production. Cut a
# SemVer tag to ship (git tag -a v0.1.0 -m "..." && git push origin v0.1.0).
# workflow_dispatch may run the gate (npm ci / typecheck) but the deploy step
# is guarded with `if: startsWith(github.ref, 'refs/tags/v')` so a manual
# dispatch from a non-tag ref never ships (same pattern as common-thread).
#
# Gate: `npm run typecheck` (tsc --noEmit) runs before deploy. tsc is not part of
# any test run, so a type error would otherwise ship silently -- it must block.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   -- per-function, DEPLOY-scoped token for this worker:
#                             Workers Scripts:Edit + Account Settings:Read (account)
#                             + Workers Routes:Edit scoped to the skyphusion.org
#                             zone ONLY (for the monitor.skyphusion.org custom
#                             domain). No R2/D1/KV-data/other-zone reach.
#   CLOUDFLARE_ACCOUNT_ID  -- the Cloudflare account id (wrangler.toml reads it
#                             from env; never hardcoded).
#
# The worker runtime secret NTFY_TOKEN is set once via `wrangler secret put` and
# persists across deploys -- it is NOT set here.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-skyphusion-monitor-tag
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy skyphusion-monitor worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm ci
      # Gate: do not ship a worker that does not typecheck.
      - run: npm run typecheck
      - name: Deploy worker
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx wrangler deploy
