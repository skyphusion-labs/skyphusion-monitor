# Advanced CodeQL (required for self-hosted fleet runners without Node on PATH).
#
# Default setup cannot inject setup-node/npm ci; its dynamic customization file is
# not merged into the generated workflow. Default setup and advanced setup also
# cannot both be enabled (SARIF upload is rejected).
#
# Disable default setup in repo Settings -> Advanced Security -> CodeQL analysis
# -> Switch to advanced before merging this workflow.
#
# Private repo -> org fleet pool per CI policy (matches ci.yml / deploy.yml).

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '20 3 * * 0'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-skyphusion-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: [self-hosted, fleet]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
